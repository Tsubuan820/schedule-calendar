<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日程調整ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fafafa; --surface: #fff; --surface-hover: #f0f0f0;
    --text: #222; --text-secondary: #444; --text-muted: #888; --text-faint: #aaa;
    --border: #ddd; --border-light: #eee;
    --toast-bg: #222; --toast-text: #fff;
  }
  [data-theme="dark"] {
    --bg: #1a1a1a; --surface: #2a2a2a; --surface-hover: #3a3a3a;
    --text: #efefef; --text-secondary: #ccc; --text-muted: #999; --text-faint: #888;
    --border: #3a3a3a; --border-light: #333;
    --toast-bg: #e0e0e0; --toast-text: #1a1a1a;
  }
  body {
    font-family: 'Inter', 'Hiragino Sans', sans-serif;
    letter-spacing: 0.02em;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app {
    max-width: 420px;
    width: 100%;
    position: relative;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .controls button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-secondary);
    transition: background 0.15s;
  }
  .controls button:hover { background: var(--surface-hover); }
  .month-label {
    font-family: 'DM Sans', 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
  }
  /* Settings area */
  .settings {
    margin-bottom: 1.25rem;
  }
  .time-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
  }
  .options-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
  }
  .time-row select {
    font-family: 'DM Sans', 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.5rem;
    text-align: center;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .time-row select:focus { border-color: var(--text-faint); }
  .time-sep {
    font-size: 1rem;
    color: var(--text-muted);
  }
  .end-toggle {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .end-toggle input[type="checkbox"] {
    accent-color: var(--text);
    cursor: pointer;
  }
  .time-row select.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .color-option {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .color-option input[type="color"] {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    padding: 1px;
    background: none;
    transition: border-color 0.15s;
  }
  .color-option input[type="color"]:hover { border-color: var(--text-faint); }

  /* Calendar */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 1.25rem;
  }
  .day-header {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-faint);
    padding: 0.25rem 0;
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-family: 'DM Sans', 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    border: 1px solid var(--border-light);
    user-select: none;
  }
  .day-cell:hover { border-color: var(--text-faint); }
  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
  }
  .day-cell.selected {
    font-weight: 600;
    border-color: transparent;
  }
  /* Buttons */
  .actions {
    display: flex;
    gap: 0.4rem;
  }
  .actions button {
    flex: 1;
    padding: 0.55rem 0.3rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'Inter', 'Hiragino Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text-secondary);
  }
  .actions button:hover { background: var(--surface-hover); }
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: var(--toast-text);
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  /* Theme toggle */
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1;
    transition: background 0.15s;
  }
  .theme-toggle:hover { background: var(--surface-hover); }
  /* Footer */
  .footer {
    margin-top: 1.5rem;
    padding: 1rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-faint);
  }
  .footer .heart { color: #e53935; }
  .footer a {
    color: var(--text-faint);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: #4a90d9; }
  .footer .sep { margin: 0 8px; opacity: 0.5; }
</style>
</head>
<body>
<div class="app">
  <div class="settings">
    <div class="time-row">
      <select id="startHour"></select><span class="time-sep">:</span><select id="startMin"></select>
      <span class="time-sep">–</span>
      <select id="endHour"></select><span class="time-sep">:</span><select id="endMin"></select>
    </div>
    <div class="options-row">
      <label class="end-toggle"><input type="checkbox" id="noEnd">終了なし</label>
      <div class="color-option">
        <span>カラー</span>
        <input type="color" id="colorPicker" value="#fbe251">
      </div>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </div>

  <div class="controls">
    <button id="prevMonth">◀</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="nextMonth">▶</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="actions">
    <button id="btnCopyImg">画像コピー</button>
    <button id="btnDownloadImg">画像ダウンロード</button>
    <button id="btnCopyText">テキストコピー</button>
  </div>
  <footer class="footer">
    Made with <span class="heart">♥</span> by <a href="https://x.com/tsubuan_sun" target="_blank">Tsubuan</a> © 2026
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS = ['日','月','火','水','木','金','土'];
let currentYear, currentMonth;
let selected = new Set();
let accentColor = '#fbe251';

const $ = id => document.getElementById(id);

function populateSelects() {
  const hours = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
  const mins = ['00','30'];
  [['startHour',hours,'20'],['endHour',hours,'21']].forEach(([id,opts,def])=>{
    const sel=$(id); opts.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); }); sel.value=def;
  });
  [['startMin',mins,'00'],['endMin',mins,'00']].forEach(([id,opts,def])=>{
    const sel=$(id); opts.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); }); sel.value=def;
  });
}

function getStartTime() {
  return $('startHour').value+':'+$('startMin').value;
}
function getEndTime() {
  return $('endHour').value+':'+$('endMin').value;
}
function hasEnd() {
  return !$('noEnd').checked;
}
function getTimeLabel() {
  return hasEnd() ? getStartTime()+' – '+getEndTime() : getStartTime()+' –';
}
function getTimeLabelText() {
  return hasEnd() ? getStartTime()+'〜'+getEndTime() : getStartTime()+'〜';
}
function updateEndState() {
  const off = $('noEnd').checked;
  $('endHour').classList.toggle('disabled', off);
  $('endMin').classList.toggle('disabled', off);
}

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  populateSelects();
  render();

  $('prevMonth').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} selected.clear(); render(); };
  $('nextMonth').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} selected.clear(); render(); };
  $('colorPicker').oninput = e => { accentColor = e.target.value; render(); };
  $('btnCopyImg').onclick = () => exportImage('clipboard');
  $('btnDownloadImg').onclick = () => exportImage('download');
  $('btnCopyText').onclick = copyText;
  ['startHour','startMin','endHour','endMin'].forEach(id => $(id).onchange = render);
  $('noEnd').onchange = () => { updateEndState(); render(); };
}

function render() {
  $('monthLabel').textContent = `${currentYear}年${currentMonth+1}月`;
  const cal = $('calendar');
  cal.innerHTML = '';
  DAYS.forEach(d => { const el = document.createElement('div'); el.className='day-header'; el.textContent=d; cal.appendChild(el); });
  const first = new Date(currentYear, currentMonth, 1).getDay();
  const last = new Date(currentYear, currentMonth+1, 0).getDate();
  for(let i=0;i<first;i++) { const el=document.createElement('div'); el.className='day-cell empty'; cal.appendChild(el); }
  for(let d=1;d<=last;d++) {
    const el = document.createElement('div');
    el.className = 'day-cell' + (selected.has(d) ? ' selected' : '');
    if(selected.has(d)){
      el.style.background = accentColor;
      const lum=parseInt(accentColor.slice(1,3),16)*0.299+parseInt(accentColor.slice(3,5),16)*0.587+parseInt(accentColor.slice(5,7),16)*0.114;
      el.style.color=lum>140?'#222':'#fff';
    } else {
      el.style.background = '';
      el.style.color = '';
    }
    el.textContent = d;
    el.onclick = () => { selected.has(d)?selected.delete(d):selected.add(d); render(); };
    cal.appendChild(el);
  }
}

function buildCanvas() {
  const S=720, cellSize=68, gap=8;
  const first = new Date(currentYear, currentMonth, 1).getDay();
  const last = new Date(currentYear, currentMonth+1, 0).getDate();
  const rows = Math.ceil((first+last)/7);
  const gridW = 7*(cellSize+gap)-gap;
  const gridH = rows*(cellSize+gap)-gap;
  const gridX0 = (S-gridW)/2;
  const titleH=80, dayHeaderH=28;
  const contentH = titleH+dayHeaderH+gridH;
  const topY = (S-contentH)/2;
  const c = document.createElement('canvas');
  c.width=S*2; c.height=S*2;
  const ctx=c.getContext('2d');
  ctx.scale(2,2);
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  // bg
  ctx.fillStyle=dark?'#1a1a1a':'#fff'; ctx.fillRect(0,0,S,S);
  // title
  ctx.fillStyle=dark?'#efefef':'#222'; ctx.font="600 24px 'DM Sans', Inter, sans-serif";
  ctx.letterSpacing='2px';
  ctx.textAlign='center'; ctx.fillText(`${currentYear}年${currentMonth+1}月`,S/2,topY+24);
  ctx.font="400 16px 'DM Sans', Inter, sans-serif"; ctx.fillStyle=dark?'#999':'#888';
  ctx.letterSpacing='1.5px';
  const tl = getTimeLabel();
  if(tl) ctx.fillText(tl,S/2,topY+48);
  // day headers
  const gridX = gridX0;
  let y = topY+titleH;
  ctx.font="600 14px 'DM Sans', Inter, sans-serif"; ctx.fillStyle=dark?'#888':'#aaa'; ctx.letterSpacing='1.5px';
  DAYS.forEach((d,i)=>{ ctx.fillText(d, gridX+i*(cellSize+gap)+cellSize/2, y+14); });
  y+=dayHeaderH;
  // cells
  for(let d=1;d<=last;d++){
    const idx=first+d-1;
    const col=idx%7, row=Math.floor(idx/7);
    const cx=gridX+col*(cellSize+gap), cy=y+row*(cellSize+gap);
    ctx.beginPath();
    ctx.roundRect(cx,cy,cellSize,cellSize,6);
    if(selected.has(d)){ ctx.fillStyle=accentColor; } else { ctx.fillStyle=dark?'#2a2a2a':'#f5f5f5'; }
    ctx.fill();
    const lum=parseInt(accentColor.slice(1,3),16)*0.299+parseInt(accentColor.slice(3,5),16)*0.587+parseInt(accentColor.slice(5,7),16)*0.114;
    ctx.fillStyle=selected.has(d)?(lum>140?'#222':'#fff'):(dark?'#ccc':'#444');
    ctx.letterSpacing='1.5px';
    ctx.font=(selected.has(d)?'600 ':'500 ')+'20px DM Sans, Inter, sans-serif';
    ctx.fillText(String(d),cx+cellSize/2,cy+cellSize/2+5);
  }
  return c;
}

async function exportImage(mode) {
  const canvas = buildCanvas();
  if(mode==='clipboard'){
    canvas.toBlob(async blob=>{
      try { await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]); toast('画像をコピーしました'); }
      catch{ toast('コピーに失敗しました'); }
    },'image/png');
  } else {
    const a=document.createElement('a');
    a.download=`schedule_${currentYear}${String(currentMonth+1).padStart(2,'0')}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
    toast('ダウンロードしました');
  }
}

function copyText() {
  if(!selected.size){ toast('日付を選択してください'); return; }
  const sorted=[...selected].sort((a,b)=>a-b);
  const lines=sorted.map(d=>{
    const date=new Date(currentYear,currentMonth,d);
    return `${currentYear}/${currentMonth+1}/${d}（${DAYS[date.getDay()]}）${getTimeLabelText()}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('テキストをコピーしました'));
}

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Theme
const savedTheme=localStorage.getItem('schedule-cal-theme')||'light';
if(savedTheme==='dark') document.documentElement.setAttribute('data-theme','dark');
$('themeToggle').textContent=savedTheme==='dark'?'☀️':'🌙';
$('themeToggle').onclick=toggleTheme;
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('schedule-cal-theme',isDark?'light':'dark');
  $('themeToggle').textContent=isDark?'🌙':'☀️';
  render();
}

init();
</script>
</body>
</html>
